<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mental Health Voice AI</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            flex-direction: column;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        button {
            padding: 14px 24px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        /* 🔥 START BUTTON */
        .start-btn {
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            box-shadow: 0 0 15px rgba(0,255,200,0.6);
        }

        /* 🔥 STOP BUTTON */
        .stop-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 0 15px rgba(255,80,100,0.6);
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255,255,255,0.6);
        }

        /* 🎤 MIC ANIMATION */
        .recording {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        audio {
            margin-top: 20px;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>🎤 Speak about your feelings</h2>

<button class="start-btn" onclick="startRecording()">Start Speaking</button>
<button class="stop-btn" onclick="stopRecording()">Stop</button>

<br><br>

<audio id="audioPlayer" controls autoplay></audio>

<script>
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();

        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        // 🔥 ADD ANIMATION
        document.querySelector(".start-btn").classList.add("recording");

        console.log("Recording started...");
    } catch (error) {
        alert("Microphone error!");
        console.error(error);
    }
}

function stopRecording() {
    mediaRecorder.stop();

    // 🔥 REMOVE ANIMATION
    document.querySelector(".start-btn").classList.remove("recording");

    mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });

        let formData = new FormData();
        formData.append("audio", audioBlob, "input.webm");

        try {
            const response = await fetch("/process", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                alert("Server error!");
                return;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);

            const audio = document.getElementById("audioPlayer");
            audio.src = url;
            audio.load();
            audio.play();

        } catch (error) {
            alert("Connection error!");
            console.error(error);
        }
    };
}
</script>

</body>
</html>
